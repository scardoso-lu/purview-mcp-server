name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-typecheck-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest tests/unit -v

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t purview-mcp-server:ci .

      - name: Verify image starts and responds on /healthz
        run: |
          docker run -d --name purview-ci -e PURVIEW_ACCOUNT_NAME=test -p 8000:8000 purview-mcp-server:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz; then ok=1; break; fi
            sleep 1
          done
          echo ""
          docker logs purview-ci
          docker rm -f purview-ci
          test "$ok" = "1"
