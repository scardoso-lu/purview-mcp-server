# Alembic config for the Purview cache database.
# The runtime bootstraps the schema via infrastructure/db/migrations.py; this
# config is for operators who want versioned migrations:
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
# The DB URL is read from the DATABASE_URL environment variable in alembic/env.py.
[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
