services:
  purview-mcp:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - "${HOME}/.azure:/home/nobody/.azure:ro"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: purview
      POSTGRES_PASSWORD: purview
      POSTGRES_DB: purview
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purview -d purview"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
